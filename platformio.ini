; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev, wokwi

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.13
    knolleary/PubSubClient@^2.8.0
    bblanchon/ArduinoJson@^6.21.3
    ; BH1750 — cảm biến ánh sáng (I2C)
    adafruit/Adafruit BusIO@^1.14.1
    ; Cảm biến độ ẩm đất capacitive — I2C (tuỳ board)
    ; InfluxDB client — lưu trữ dữ liệu lịch sử
    toby51/InfluxDBClient@^1.11.0

; Wokwi: SSID Wokwi-GUEST + WiFi.begin(..., 6). Build: pio run -e wokwi
[env:wokwi]
extends = env:esp32dev
build_flags = -D WOKWI
